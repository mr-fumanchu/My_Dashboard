<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mail Accounts — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
  <style>
    /* ── Shared field styles ───────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-secondary);
    }
    .field input, .field select {
      padding: 0.55rem 0.75rem; border: 1px solid var(--gray-200);
      border-radius: var(--radius); font-size: 0.9rem; background: #fff;
      color: var(--text-primary); outline: none; transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus { border-color: var(--yellow-400); }

    /* ── Breadcrumb ────────────────────────────────────────────── */
    .breadcrumb {
      font-size: 0.8rem; color: var(--gray-400);
      display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem;
    }
    .breadcrumb a { color: var(--gray-400); text-decoration: none; }
    .breadcrumb a:hover { color: var(--yellow-400); }
    .breadcrumb-sep { font-size: 0.7rem; }

    /* ── Account cards ─────────────────────────────────────────── */
    .account-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .account-card {
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 1rem 1.25rem; display: flex; align-items: flex-start;
      gap: 1rem; background: var(--gray-100);
    }
    .account-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--yellow-400); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; color: var(--gray-900);
    }
    .account-info { flex: 1; min-width: 0; }
    .account-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .account-email { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .account-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .badge {
      font-size: 0.68rem; font-weight: 600; padding: 2px 8px;
      border-radius: 999px; white-space: nowrap;
    }
    .badge-blue   { background: #e3f2fd; color: #1565c0; }
    .badge-green  { background: #e8f5e9; color: #2e7d32; }
    .badge-orange { background: #fff3e0; color: #e65100; }
    .badge-gray   { background: var(--gray-200); color: var(--gray-600); }
    .badge-ssl    { background: #e8f5e9; color: #2e7d32; }
    .btn-remove {
      background: none; border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 0.3rem 0.6rem; font-size: 0.78rem; cursor: pointer; color: var(--gray-400);
      transition: background 0.15s, color 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .btn-remove:hover { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }
    .empty-msg { font-size: 0.875rem; color: var(--gray-400); padding: 0.5rem 0; }

    /* ── Add account form ──────────────────────────────────────── */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 80px; gap: 1rem; }
    @media (max-width: 640px) {
      .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
    }
    .server-section {
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 1rem; display: flex; flex-direction: column; gap: 0.85rem;
    }
    .server-section-title {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-secondary);
      margin-bottom: 0.1rem;
    }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.875rem;
    }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 999px;
      background: var(--gray-400); cursor: pointer; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--yellow-400); }
    .toggle-track::after {
      content: ''; position: absolute; left: 3px; top: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }
    .btn-primary {
      align-self: flex-start; padding: 0.6rem 1.5rem;
      background: var(--yellow-400); border: none; border-radius: var(--radius);
      font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--yellow-300); }
    .btn-secondary {
      align-self: flex-start; padding: 0.6rem 1.5rem;
      background: var(--gray-200); border: none; border-radius: var(--radius);
      font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--gray-400); color: #fff; }
    .form-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .pw-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .pw-row .field { flex: 1; }
    .btn-reveal {
      flex-shrink: 0; padding: 0.55rem 0.75rem;
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      background: var(--gray-100); cursor: pointer; font-size: 0.8rem;
      color: var(--text-secondary); transition: background 0.15s;
    }
    .btn-reveal:hover { background: var(--gray-200); }
    .divider {
      border: none; border-top: 1px solid var(--gray-200); margin: 0.25rem 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="header-title">Dashboard</h1>
    <nav class="header-nav">
      <a href="index.html">Home</a>
      <a href="reports.html">Reports</a>
      <a href="settings.html" style="color:var(--yellow-400)">Settings</a>
    </nav>
  </header>

  <main class="main">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Overview</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="calendar.html">Calendar</a></li>
      </ul>
    </aside>

    <section class="content">

      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="settings.html">Settings</a>
        <span class="breadcrumb-sep">›</span>
        <span>Mail Accounts</span>
      </div>

      <!-- Configured accounts -->
      <div class="panel">
        <h2 class="panel-title">Configured Accounts</h2>
        <div class="account-list" id="account-list">
          <p class="empty-msg" id="empty-msg">No accounts configured yet.</p>
        </div>
      </div>

      <!-- Add account form -->
      <div class="panel">
        <h2 class="panel-title">Add Account</h2>
        <div style="display:flex;flex-direction:column;gap:1.25rem;">

          <!-- Basic info -->
          <div class="form-grid-2">
            <div class="field">
              <label>Account Name</label>
              <input type="text" id="acc-name" placeholder="e.g. Work Email" />
            </div>
            <div class="field">
              <label>Email Address</label>
              <input type="email" id="acc-email" placeholder="you@example.com" />
            </div>
          </div>

          <div class="form-grid-2">
            <div class="field">
              <label>Username</label>
              <input type="text" id="acc-user" placeholder="Usually your email address" />
            </div>
            <div class="pw-row">
              <div class="field">
                <label>Password</label>
                <input type="password" id="acc-pass" placeholder="••••••••" autocomplete="off" />
              </div>
              <button class="btn-reveal" id="reveal-pass">Show</button>
            </div>
          </div>

          <hr class="divider" />

          <!-- Incoming -->
          <div class="server-section">
            <div class="server-section-title">Incoming Mail Server</div>
            <div class="form-grid-3">
              <div class="field">
                <label>Protocol</label>
                <select id="inc-proto">
                  <option value="IMAP">IMAP</option>
                  <option value="POP3">POP3</option>
                </select>
              </div>
              <div class="field">
                <label>Host</label>
                <input type="text" id="inc-host" placeholder="imap.example.com" />
              </div>
              <div class="field">
                <label>Port</label>
                <input type="number" id="inc-port" placeholder="993" value="993" min="1" max="65535" />
              </div>
            </div>
            <div class="toggle-row">
              <span>SSL / TLS</span>
              <label class="toggle">
                <input type="checkbox" id="inc-ssl" checked />
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>

          <!-- Outgoing -->
          <div class="server-section">
            <div class="server-section-title">Outgoing Mail Server (SMTP)</div>
            <div class="form-grid-3">
              <div class="field">
                <label>Host</label>
                <input type="text" id="out-host" placeholder="smtp.example.com"
                       style="grid-column:1/3" />
              </div>
              <div class="field">
                <label>Host</label>
                <input type="text" id="out-host2" placeholder="smtp.example.com" style="display:none" />
              </div>
              <div class="field">
                <label>Port</label>
                <input type="number" id="out-port" placeholder="587" value="587" min="1" max="65535" />
              </div>
            </div>
            <div class="toggle-row">
              <span>SSL / TLS</span>
              <label class="toggle">
                <input type="checkbox" id="out-ssl" checked />
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn-primary" id="btn-add">Add Account</button>
            <button class="btn-secondary" id="btn-clear">Clear</button>
          </div>

        </div>
      </div>

    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    const STORE_KEY = 'mail_accounts';

    function load() {
      return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
    }
    function save(accounts) {
      localStorage.setItem(STORE_KEY, JSON.stringify(accounts));
    }

    // ── Render account list ──────────────────────────────────────
    function renderAccounts() {
      const accounts = load();
      const list = document.getElementById('account-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      if (!accounts.length) {
        list.appendChild(empty);
        empty.style.display = '';
        return;
      }

      accounts.forEach((acc, idx) => {
        const initials = acc.name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const card = document.createElement('div');
        card.className = 'account-card';
        card.innerHTML = `
          <div class="account-icon">${initials}</div>
          <div class="account-info">
            <div class="account-name">${esc(acc.name)}</div>
            <div class="account-email">${esc(acc.email)}</div>
            <div class="account-meta">
              <span class="badge badge-blue">${esc(acc.incProto)}: ${esc(acc.incHost)}:${esc(acc.incPort)}</span>
              <span class="badge badge-orange">SMTP: ${esc(acc.outHost)}:${esc(acc.outPort)}</span>
              ${acc.incSsl ? '<span class="badge badge-ssl">SSL ✓</span>' : ''}
              <span class="badge badge-gray">${esc(acc.user)}</span>
            </div>
          </div>
          <button class="btn-remove" data-idx="${idx}">Remove</button>`;
        list.appendChild(card);
      });

      list.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.idx);
          const accounts = load();
          accounts.splice(i, 1);
          save(accounts);
          renderAccounts();
        });
      });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Add account ──────────────────────────────────────────────
    document.getElementById('btn-add').addEventListener('click', () => {
      const name    = document.getElementById('acc-name').value.trim();
      const email   = document.getElementById('acc-email').value.trim();
      const user    = document.getElementById('acc-user').value.trim();
      const pass    = document.getElementById('acc-pass').value;
      const incProto = document.getElementById('inc-proto').value;
      const incHost  = document.getElementById('inc-host').value.trim();
      const incPort  = document.getElementById('inc-port').value.trim();
      const incSsl   = document.getElementById('inc-ssl').checked;
      const outHost  = document.getElementById('out-host').value.trim();
      const outPort  = document.getElementById('out-port').value.trim();
      const outSsl   = document.getElementById('out-ssl').checked;

      if (!name || !email || !incHost || !outHost) {
        alert('Please fill in at minimum: Account Name, Email, Incoming Host, and Outgoing Host.');
        return;
      }

      const accounts = load();
      accounts.push({ name, email, user, pass, incProto, incHost, incPort, incSsl, outHost, outPort, outSsl });
      save(accounts);
      renderAccounts();
      clearForm();
    });

    document.getElementById('btn-clear').addEventListener('click', clearForm);

    function clearForm() {
      ['acc-name','acc-email','acc-user','acc-pass','inc-host','out-host'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('inc-port').value = '993';
      document.getElementById('out-port').value = '587';
      document.getElementById('inc-ssl').checked = true;
      document.getElementById('out-ssl').checked = true;
      document.getElementById('inc-proto').value = 'IMAP';
    }

    // ── Password reveal ──────────────────────────────────────────
    document.getElementById('reveal-pass').addEventListener('click', function () {
      const inp = document.getElementById('acc-pass');
      if (inp.type === 'password') { inp.type = 'text'; this.textContent = 'Hide'; }
      else { inp.type = 'password'; this.textContent = 'Show'; }
    });

    // ── Auto-suggest ports when protocol changes ─────────────────
    document.getElementById('inc-proto').addEventListener('change', function () {
      document.getElementById('inc-port').value = this.value === 'POP3' ? '995' : '993';
    });

    // ── Init ─────────────────────────────────────────────────────
    renderAccounts();
  </script>
</body>
</html>
